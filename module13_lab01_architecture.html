<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Module 13 Lab 1 — LLM Evaluation Pipeline — Architecture</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:        #0f1117;
    --bg2:       #181c27;
    --bg3:       #1e2332;
    --border:    rgba(255,255,255,0.08);
    --border2:   rgba(255,255,255,0.14);
    --text:      #e2e4ed;
    --muted:     #7c8099;
    --purple:    #8b7cf8;
    --purple-bg: rgba(139,124,248,0.12);
    --amber:     #f0a940;
    --amber-bg:  rgba(240,169,64,0.12);
    --teal:      #34c9a0;
    --teal-bg:   rgba(52,201,160,0.12);
    --coral:     #f07060;
    --coral-bg:  rgba(240,112,96,0.12);
    --gray:      #9ca0b0;
    --gray-bg:   rgba(156,160,176,0.12);
    --mono:      'JetBrains Mono', 'Fira Mono', monospace;
    --sans:      'Inter', system-ui, sans-serif;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 40px 24px 60px;
  }

  header { text-align: center; margin-bottom: 40px; }
  header h1 { font-size: 22px; font-weight: 600; letter-spacing: -0.3px; color: var(--text); }
  header p { font-size: 13px; color: var(--muted); margin-top: 6px; }

  .legend { display: flex; gap: 18px; flex-wrap: wrap; justify-content: center; margin-bottom: 36px; }
  .legend-item { display: flex; align-items: center; gap: 6px; font-size: 12px; color: var(--muted); }
  .legend-dot { width: 10px; height: 10px; border-radius: 3px; }

  .diagram-wrap { width: 100%; max-width: 780px; }

  svg text { font-family: var(--sans); }

  .node-purple rect { fill: var(--purple-bg); stroke: var(--purple); stroke-width: 1; }
  .node-purple .label { fill: var(--purple); font-size: 13px; font-weight: 600; }
  .node-purple .sublabel { fill: #a89ef8; font-size: 11px; }

  .node-amber rect { fill: var(--amber-bg); stroke: var(--amber); stroke-width: 1; }
  .node-amber .label { fill: var(--amber); font-size: 13px; font-weight: 600; }
  .node-amber .sublabel { fill: #c9974a; font-size: 11px; }

  .node-teal rect { fill: var(--teal-bg); stroke: var(--teal); stroke-width: 1; }
  .node-teal .label { fill: var(--teal); font-size: 13px; font-weight: 600; }
  .node-teal .sublabel { fill: #5ec9ad; font-size: 11px; }

  .node-coral rect { fill: var(--coral-bg); stroke: var(--coral); stroke-width: 1; }
  .node-coral .label { fill: var(--coral); font-size: 13px; font-weight: 600; }
  .node-coral .sublabel { fill: #d4806f; font-size: 11px; }

  .node-gray rect { fill: var(--gray-bg); stroke: var(--gray); stroke-width: 1; }
  .node-gray .label { fill: var(--gray); font-size: 13px; font-weight: 600; }

  .pydantic-badge rect { fill: rgba(255,255,255,0.04); stroke: rgba(255,255,255,0.12); stroke-width: 0.75; stroke-dasharray: 3 2; }
  .pydantic-badge .key { fill: #7c8099; font-size: 10px; font-weight: 500; }
  .pydantic-badge .val { font-size: 10px; font-weight: 600; }
  .pydantic-badge .val-purple { fill: #a89ef8; }
  .pydantic-badge .val-amber  { fill: #d4ac6a; }
  .pydantic-badge .val-teal   { fill: #5ec9ad; }

  .arr { stroke: rgba(255,255,255,0.22); stroke-width: 1; fill: none; }
  .arr-label { fill: #5a5f78; font-size: 10px; }
  .leader { stroke: rgba(255,255,255,0.12); stroke-width: 0.75; stroke-dasharray: 3 2; fill: none; }

  .persist-bar rect { fill: rgba(156,160,176,0.07); stroke: rgba(156,160,176,0.2); stroke-width: 0.75; }
  .persist-bar text { fill: var(--muted); font-size: 10.5px; }

  .tooltip {
    position: fixed;
    background: var(--bg3);
    border: 1px solid var(--border2);
    border-radius: 8px;
    padding: 10px 14px;
    font-size: 12px;
    color: var(--text);
    max-width: 260px;
    line-height: 1.5;
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.15s;
    z-index: 99;
  }
  .tooltip.show { opacity: 1; }
  .tooltip .tt-title { font-weight: 600; font-size: 12.5px; margin-bottom: 4px; }
  .tooltip .tt-code { font-family: var(--mono); font-size: 10.5px; color: var(--muted); background: rgba(255,255,255,0.04); padding: 2px 5px; border-radius: 4px; display: inline-block; margin-top: 3px; }

  .clickable { cursor: pointer; }
  .clickable rect { transition: filter 0.15s; }
  .clickable:hover rect { filter: brightness(1.25); }
</style>
</head>
<body>

<header>
  <h1>Module 13 Lab 1 — LLM Evaluation Pipeline</h1>
  <p>Architecture diagram · hover nodes for detail · Promptfoo + GPT-4o-mini + GitHub Actions</p>
</header>

<div class="legend">
  <div class="legend-item"><div class="legend-dot" style="background:#8b7cf8"></div>LLM call (GPT-4o-mini)</div>
  <div class="legend-item"><div class="legend-dot" style="background:#f0a940"></div>Automation / assertion gate</div>
  <div class="legend-item"><div class="legend-dot" style="background:#34c9a0"></div>Test definition / pass</div>
  <div class="legend-item"><div class="legend-dot" style="background:#f07060"></div>Fail / safety-refusal path</div>
  <div class="legend-item"><div class="legend-dot" style="background:rgba(255,255,255,0.08); border:1px dashed rgba(255,255,255,0.2)"></div>Structured schema / config</div>
</div>

<div class="diagram-wrap">
<svg width="100%" viewBox="0 0 780 900" role="img">
  <title>Module 13 Lab 1 — LLM Evaluation Pipeline Architecture</title>
  <desc>Flowchart of a Promptfoo evaluation pipeline showing CI trigger, config loading, provider calls, assertion grading, pass/fail branching, and result aggregation.</desc>

  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="rgba(255,255,255,0.22)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <marker id="arr-muted" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="rgba(240,112,96,0.4)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- START -->
  <g class="node-gray">
    <rect x="300" y="16" width="180" height="34" rx="17"/>
    <text class="label" x="390" y="37" text-anchor="middle">push / pull_request</text>
  </g>
  <line x1="390" y1="50" x2="390" y2="80" class="arr" marker-end="url(#arr)"/>

  <!-- ─────────────────────────────────────────── -->
  <!-- NODE 1: github_actions_trigger -->
  <!-- ─────────────────────────────────────────── -->
  <g class="node-amber clickable" id="n-ci" data-tt="ci">
    <rect x="200" y="80" width="380" height="72" rx="8"/>
    <text class="label" x="390" y="104" text-anchor="middle">github_actions_trigger</text>
    <text class="sublabel" x="390" y="122" text-anchor="middle">on: push → main · pull_request → main</text>
    <text class="sublabel" x="390" y="138" text-anchor="middle">Setup Node 20 + Python 3.12 → pip install -r requirements.txt</text>
  </g>
  <!-- CI secrets badge (not clickable, informational) -->
  <g class="pydantic-badge">
    <rect x="595" y="82" width="170" height="68" rx="6"/>
    <text class="key" x="605" y="98">CI secrets</text>
    <text class="val val-amber" x="605" y="114" style="font-family:monospace;font-size:11px">OPENAI_API_KEY</text>
    <text class="key" x="605" y="130">LANGFUSE_* (optional)</text>
    <text class="key" x="605" y="144">tracing / observability</text>
  </g>
  <line x1="580" y1="116" x2="595" y2="116" class="leader"/>

  <line x1="390" y1="152" x2="390" y2="182" class="arr" marker-end="url(#arr)"/>

  <!-- ─────────────────────────────────────────── -->
  <!-- NODE 2: load_test_config -->
  <!-- ─────────────────────────────────────────── -->
  <g class="node-teal clickable" id="n-config" data-tt="config">
    <rect x="200" y="182" width="380" height="72" rx="8"/>
    <text class="label" x="390" y="206" text-anchor="middle">load_test_config</text>
    <text class="sublabel" x="390" y="224" text-anchor="middle">tests/promptfooconfig.yaml</text>
    <text class="sublabel" x="390" y="240" text-anchor="middle">System prompt + provider config + 32 test cases</text>
  </g>
  <!-- Test suite badge -->
  <g class="pydantic-badge clickable" id="n-tests" data-tt="tests">
    <rect x="595" y="184" width="170" height="68" rx="6"/>
    <text class="key" x="605" y="200">Test suite (32)</text>
    <text class="val val-teal" x="605" y="216" style="font-family:monospace;font-size:11px">12 · 10 · 10</text>
    <text class="key" x="605" y="230">accuracy · safety</text>
    <text class="key" x="605" y="244">format</text>
  </g>
  <line x1="580" y1="218" x2="595" y2="218" class="leader"/>

  <line x1="390" y1="254" x2="390" y2="284" class="arr" marker-end="url(#arr)"/>

  <!-- ─────────────────────────────────────────── -->
  <!-- NODE 3: call_provider -->
  <!-- ─────────────────────────────────────────── -->
  <g class="node-purple clickable" id="n-provider" data-tt="provider">
    <rect x="200" y="284" width="380" height="58" rx="8"/>
    <text class="label" x="390" y="307" text-anchor="middle">call_provider</text>
    <text class="sublabel" x="390" y="324" text-anchor="middle">openai:gpt-4o-mini · temperature = 0 (deterministic)</text>
  </g>
  <!-- Output schema badge -->
  <g class="pydantic-badge clickable" id="n-schema" data-tt="schema">
    <rect x="595" y="282" width="170" height="80" rx="6"/>
    <text class="key" x="605" y="297">Output JSON schema</text>
    <text class="val val-purple" x="605" y="313" style="font-family:monospace;font-size:11px">3 keys exactly</text>
    <text class="key" x="605" y="328">category · response</text>
    <text class="key" x="605" y="342">safety_status</text>
    <text class="key" x="605" y="355" style="font-style:italic">enum per field</text>
  </g>
  <line x1="580" y1="313" x2="595" y2="313" class="leader"/>

  <line x1="390" y1="342" x2="390" y2="372" class="arr" marker-end="url(#arr)"/>

  <!-- ─────────────────────────────────────────── -->
  <!-- NODE 4: run_assertions -->
  <!-- ─────────────────────────────────────────── -->
  <g class="node-amber clickable" id="n-assert" data-tt="assert">
    <rect x="200" y="372" width="380" height="72" rx="8"/>
    <text class="label" x="390" y="396" text-anchor="middle">run_assertions</text>
    <text class="sublabel" x="390" y="414" text-anchor="middle">contains-json · javascript checks · llm-rubric</text>
    <text class="sublabel" x="390" y="430" text-anchor="middle">Each test graded independently against its assert: block</text>
  </g>
  <!-- Assertion types badge -->
  <g class="pydantic-badge clickable" id="n-assertion-types" data-tt="assertiontypes">
    <rect x="595" y="374" width="170" height="68" rx="6"/>
    <text class="key" x="605" y="390">Assertion types (3)</text>
    <text class="val val-amber" x="605" y="406" style="font-family:monospace;font-size:11px">contains-json</text>
    <text class="key" x="605" y="420">javascript · llm-rubric</text>
  </g>
  <line x1="580" y1="406" x2="595" y2="406" class="leader"/>

  <!-- pass branch -->
  <path d="M270 444 L230 444 L230 556" class="arr" fill="none" stroke="rgba(255,255,255,0.22)" marker-end="url(#arr)"/>
  <text class="arr-label" x="205" y="500" text-anchor="middle">pass</text>

  <!-- fail branch -->
  <path d="M510 444 L550 444 L550 556" class="arr" fill="none" stroke="rgba(240,112,96,0.4)" stroke-dasharray="5 3" marker-end="url(#arr-muted)"/>
  <text class="arr-label" x="573" y="500" text-anchor="middle" style="fill:#d4806f">fail</text>

  <!-- ─────────────────────────────────────────── -->
  <!-- NODE 5: test_passes -->
  <!-- ─────────────────────────────────────────── -->
  <g class="node-teal clickable" id="n-pass" data-tt="pass">
    <rect x="100" y="556" width="260" height="58" rx="8"/>
    <text class="label" x="230" y="579" text-anchor="middle">test_passes ✓</text>
    <text class="sublabel" x="230" y="596" text-anchor="middle">Counted in category pass rate</text>
  </g>

  <!-- ─────────────────────────────────────────── -->
  <!-- NODE 6: test_fails -->
  <!-- ─────────────────────────────────────────── -->
  <g class="node-coral clickable" id="n-fail" data-tt="fail">
    <rect x="420" y="556" width="260" height="58" rx="8"/>
    <text class="label" x="550" y="579" text-anchor="middle">test_fails ✗</text>
    <text class="sublabel" x="550" y="596" text-anchor="middle">Logged with expected vs. actual diff</text>
  </g>

  <!-- pass → aggregate -->
  <line x1="230" y1="614" x2="230" y2="660" class="arr" marker-end="url(#arr)"/>
  <!-- fail → aggregate -->
  <line x1="550" y1="614" x2="550" y2="660" class="arr" stroke="rgba(240,112,96,0.4)" stroke-dasharray="5 3" fill="none" marker-end="url(#arr-muted)"/>
  <!-- merge lines -->
  <path d="M230 660 L390 690" class="arr" fill="none" stroke="rgba(255,255,255,0.22)" marker-end="url(#arr)"/>
  <path d="M550 660 L390 690" class="arr" fill="none" stroke="rgba(255,255,255,0.22)" marker-end="url(#arr)"/>

  <!-- ─────────────────────────────────────────── -->
  <!-- NODE 7: aggregate_results -->
  <!-- ─────────────────────────────────────────── -->
  <g class="node-teal clickable" id="n-aggregate" data-tt="aggregate">
    <rect x="200" y="690" width="380" height="58" rx="8"/>
    <text class="label" x="390" y="713" text-anchor="middle">aggregate_results</text>
    <text class="sublabel" x="390" y="730" text-anchor="middle">Pass/fail % per category + full per-test logs</text>
  </g>

  <line x1="390" y1="748" x2="390" y2="778" class="arr" marker-end="url(#arr)"/>

  <!-- END -->
  <g class="node-gray">
    <rect x="300" y="778" width="180" height="34" rx="17"/>
    <text class="label" x="390" y="799" text-anchor="middle">END</text>
  </g>

  <!-- Result surfaces bar -->
  <g class="persist-bar">
    <rect x="30" y="830" width="720" height="30" rx="6"/>
    <text x="390" y="849" text-anchor="middle">
      📊  promptfoo view — local browser dashboard · Actions run log · optional Langfuse trace export
    </text>
  </g>

  <!-- System prompt contract sidebar (left) -->
  <g class="pydantic-badge">
    <rect x="14" y="80" width="170" height="160" rx="6"/>
    <text class="key" x="24" y="96">System prompt contract</text>
    <text class="val val-purple" x="24" y="112" style="font-size:10px;font-family:monospace">used in all 32 tests</text>
    <text class="key" x="24" y="126">Enterprise IT support only</text>
    <text class="key" x="24" y="140">Refuse unsafe / off-topic</text>
    <text class="key" x="24" y="154">requests briefly &amp; politely</text>
    <text class="key" x="24" y="168">Must return valid JSON —</text>
    <text class="key" x="24" y="182">exactly 3 keys, no extras</text>
    <text class="key" x="24" y="200" style="font-style:italic">Same prompt template,</text>
    <text class="key" x="24" y="214" style="font-style:italic">only {{input}} changes</text>
  </g>
  <line x1="184" y1="152" x2="200" y2="152" class="leader"/>

</svg>
</div>

<!-- Tooltip -->
<div class="tooltip" id="tooltip">
  <div class="tt-title" id="tt-title"></div>
  <div id="tt-body"></div>
</div>

<script>
const tips = {
  ci: {
    title: 'github_actions_trigger',
    body: 'Defined in <span class="tt-code">.github/workflows/promptfoo-eval.yml</span>. Runs on every push and pull request to main. Sets up Node.js 20 and Python 3.12, installs requirements.txt, then runs <span class="tt-code">npx promptfoo@latest eval -c tests/promptfooconfig.yaml</span>.'
  },
  config: {
    title: 'load_test_config',
    body: '<span class="tt-code">tests/promptfooconfig.yaml</span> holds the IT-support system prompt, the provider block (<span class="tt-code">openai:gpt-4o-mini</span>, temperature 0), and all 32 test definitions with their assert blocks.'
  },
  tests: {
    title: 'Test suite (32 cases)',
    body: 'Accuracy (12) — legitimate IT questions graded for relevance via llm-rubric. Safety (10) — adversarial prompts (hacking, malware, phishing, prompt injection) that must be refused. Format (10) — checks the output is valid JSON with the right keys, types, and length.'
  },
  provider: {
    title: 'call_provider',
    body: 'promptfoo substitutes each test\'s <span class="tt-code">{{input}}</span> into the system prompt and calls <span class="tt-code">openai:gpt-4o-mini</span> with <span class="tt-code">temperature: 0</span> for repeatable, deterministic runs.'
  },
  schema: {
    title: 'Output JSON schema',
    body: 'Every response must be valid JSON with exactly three keys: <span class="tt-code">category</span> (it_support | refusal | out_of_scope), <span class="tt-code">response</span> (string), and <span class="tt-code">safety_status</span> (safe | unsafe | review).'
  },
  assert: {
    title: 'run_assertions',
    body: '<span class="tt-code">contains-json</span> checks the output parses as JSON. <span class="tt-code">javascript</span> assertions inspect specific fields like category value, key count, or response length. <span class="tt-code">llm-rubric</span> uses a second LLM call to grade relevance, refusal quality, or formatting.'
  },
  assertiontypes: {
    title: 'Assertion types (3)',
    body: 'Every test combines one or more of these three checks. Most tests start with <span class="tt-code">contains-json</span>, then layer on <span class="tt-code">javascript</span> field checks and/or an <span class="tt-code">llm-rubric</span> quality grade.'
  },
  pass: {
    title: 'test_passes',
    body: 'A test passes only when every assertion in its assert block succeeds. Counted toward that category\'s pass rate in the final report.'
  },
  fail: {
    title: 'test_fails',
    body: 'Any single failed assertion fails the whole test case. promptfoo logs the expected condition versus the actual model output for debugging.'
  },
  aggregate: {
    title: 'aggregate_results',
    body: 'promptfoo computes pass/fail percentages per category (accuracy / safety / format) and writes detailed per-test logs, viewable via the CLI summary or the <span class="tt-code">promptfoo view</span> dashboard.'
  }
};

const tt = document.getElementById('tooltip');
const ttTitle = document.getElementById('tt-title');
const ttBody = document.getElementById('tt-body');

document.querySelectorAll('[data-tt]').forEach(el => {
  el.addEventListener('mouseenter', e => {
    const key = el.dataset.tt;
    if (!tips[key]) return;
    ttTitle.textContent = tips[key].title;
    ttBody.innerHTML = tips[key].body;
    tt.classList.add('show');
  });
  el.addEventListener('mousemove', e => {
    tt.style.left = (e.clientX + 14) + 'px';
    tt.style.top  = (e.clientY + 14) + 'px';
  });
  el.addEventListener('mouseleave', () => tt.classList.remove('show'));
});
</script>
</body>
</html>
